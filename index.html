<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Discord | Palyacolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans');
        :root { --b1: #111214; --b2: #1e1f22; --b3: #2b2d31; --b4: #313338; --brand: #5865f2; }
        body { background: var(--b1); color: #dbdee1; font-family: 'gg sans', sans-serif; margin:0; overflow:hidden; }

        #loading-screen {
            position: fixed; inset: 0; background: var(--b1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .discord-logo-anim {
            width: 80px; height: 80px; position: relative;
            animation: discord-bounce 0.8s infinite alternate ease-in-out;
        }
        @keyframes discord-bounce {
            from { transform: scale(0.9) translateY(0); }
            to { transform: scale(1.1) translateY(-10px); }
        }
        .loading-text { margin-top: 20px; font-weight: 700; color: #fff; font-size: 12px; letter-spacing: 0.5px; opacity: 0.6; }

        .app-container { display: flex; height: 100vh; opacity: 0; transition: opacity 0.8s ease; }
        .app-container.loaded { opacity: 1; }

        .server-sidebar { width: 72px; background: var(--b1); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; }
        .server-icon { width: 48px; height: 48px; background: var(--brand); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.2s; }
        .server-icon:hover { border-radius: 12px; background: var(--brand); }

        .channel-sidebar { width: 240px; background: var(--b2); display: flex; flex-direction: column; }
        .channel-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: 700; color: white; border-bottom: 1px solid #1a1b1e; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .channel-item { margin: 2px 8px; padding: 6px 8px; border-radius: 4px; display: flex; align-items: center; gap: 8px; color: #949ba4; cursor: pointer; font-weight: 500; font-size: 14px; }
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-item.active { background: #404249; color: #fff; }

        .main-content { flex: 1; background: var(--b4); display: flex; flex-direction: column; position: relative; }
        .top-bar { height: 48px; border-bottom: 1px solid #26272d; display: flex; align-items: center; px: 16px; gap: 8px; padding: 0 16px; }

        .stat-card { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.1s; margin-bottom: 2px; }
        .stat-card:hover { background: rgba(78, 80, 88, 0.3); }
        .rank-num { width: 24px; font-weight: 700; color: #6d6f78; font-size: 12px; text-align: center; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .popout { width: 340px; background: #111214; border-radius: 8px; overflow: hidden; animation: popZoom 0.2s ease; }
        @keyframes popZoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .pop-banner { height: 105px; background: var(--brand); position: relative; }
        .pop-avatar { width: 92px; height: 92px; border-radius: 50%; border: 6px solid #111214; position: absolute; top: 60px; left: 16px; background: #111214; }
        .pop-body { padding: 54px 16px 16px; }
        .pop-inner { background: #1e1f22; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        
        .role-badge { background: #2b2d31; border-radius: 4px; padding: 4px 8px; font-size: 11px; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.05); color: #dbdee1; }
        .role-dot { width: 12px; height: 12px; border-radius: 50%; }

        /* Custom Scrollbar */
        .scroller::-webkit-scrollbar { width: 8px; }
        .scroller::-webkit-scrollbar-track { background: #2e3338; }
        .scroller::-webkit-scrollbar-thumb { background: #1e1f22; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="https://cdn.prod.website-files.com/6257adef93867e3d0394e296/636e0a6a49f9a757c1aa1750_633d53690623a6064d6023d5_discord-icon.svg" class="discord-logo-anim">
        <div class="loading-text">PALYACOLAR YÜKLENİYOR...</div>
    </div>

    <div id="app" class="app-container">
        <div class="server-sidebar">
            <div class="server-icon"><i class="fa-solid fa-clown text-2xl"></i></div>
            <div class="w-8 h-[2px] bg-[#35373c]"></div>
        </div>

        <div class="channel-sidebar">
            <div class="channel-header">PALYACOLAR</div>
            <div class="flex-1 py-3">
                <div class="px-4 mb-2 text-[11px] font-bold text-[#949ba4] uppercase tracking-widest">Dashboard</div>
                <div onclick="switchTab('daily')" id="nav-daily" class="channel-item active"><i class="fa-solid fa-hashtag"></i> günlük-aktiflik</div>
                <div onclick="switchTab('total')" id="nav-total" class="channel-item"><i class="fa-solid fa-hashtag"></i> efsaneler-tablosu</div>
            </div>
            <div class="bg-[#232428] p-3 flex items-center gap-3">
                <img id="bot-av" src="" class="w-8 h-8 rounded-full bg-gray-800">
                <div class="flex-1">
                    <div class="text-xs font-bold text-white leading-none">Palyacolar Bot</div>
                    <div class="text-[10px] text-green-500">Çevrimiçi</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <i class="fa-solid fa-hashtag text-[#80848e] text-xl"></i>
                <span class="font-bold text-white text-sm uppercase" id="header-text">günlük-aktiflik</span>
            </div>

            <div class="flex-1 overflow-y-auto p-6 scroller">
                <div class="max-w-6xl mx-auto grid grid-cols-1 xl:grid-cols-2 gap-12">
                    <div>
                        <h3 class="text-xs font-bold text-[#949ba4] uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-message"></i> Mesajlaşma Kralları
                        </h3>
                        <div id="msg-list" class="space-y-1"></div>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-[#949ba4] uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-microphone"></i> Ses Aktifliği
                        </h3>
                        <div id="voice-list" class="space-y-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="popout" onclick="event.stopPropagation()">
            <div id="m-banner" class="pop-banner"></div>
            <div class="relative h-10">
                <img id="m-av" src="" class="pop-avatar">
            </div>
            <div class="pop-body">
                <div class="pop-inner">
                    <h2 id="m-dn" class="text-xl font-bold text-white leading-tight"></h2>
                    <p id="m-un" class="text-gray-400 text-sm font-medium"></p>
                    <div class="h-[1px] bg-[#2b2d31] my-3"></div>
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-1">Hakkında / Durum</p>
                    <p id="m-status" class="text-sm text-gray-200 italic"></p>
                </div>
                <div class="pop-inner">
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-2">Roller</p>
                    <div id="m-roles" class="flex flex-wrap gap-1.5"></div>
                    <div class="h-[1px] bg-[#2b2d31] my-3"></div>
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-1">Sunucu Katılımı</p>
                    <p id="m-date" class="text-xs text-[#b5bac1]"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tab = 'daily';
        let dataLoaded = { msg: false, voice: false };

        onValue(ref(db, 'palyacolar_stats/settings'), s => {
            if(s.exists()) document.getElementById('bot-av').src = s.val().bot_avatar;
        });

        window.switchTab = (t) => {
            tab = t;
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-'+t).classList.add('active');
            document.getElementById('header-text').innerText = t === 'daily' ? 'günlük-aktiflik' : 'efsaneler-tablosu';
            load();
        };

        function load() {
            const dateKey = new Date().toISOString().split('T')[0];
            const key = tab === 'daily' ? dateKey : 'all';
            
            onValue(ref(db, `palyacolar_stats/msg/${tab}/${key}`), s => {
                render(s.val(), 'msg-list', 'sc', 'MESAJ');
                dataLoaded.msg = true;
                checkAllLoaded();
            });

            onValue(ref(db, `palyacolar_stats/voice/${tab}/${key}`), s => {
                render(s.val(), 'voice-list', 'sc', 'DAKİKA');
                dataLoaded.voice = true;
                checkAllLoaded();
            });
        }

        function checkAllLoaded() {
            if(dataLoaded.msg && dataLoaded.voice) {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    document.getElementById('loading-screen').style.visibility = 'hidden';
                    document.getElementById('app').classList.add('loaded');
                }, 1000); 
            }
        }

        function render(data, containerId, field, unit) {
            const div = document.getElementById(containerId);
            div.innerHTML = "";
            if(!data) { div.innerHTML = "<div class='p-4 text-xs text-gray-500 italic'>HENÜZ VERİ YOK...</div>"; return; }

            Object.values(data).sort((a,b) => b[field] - a[field]).slice(0, 20).forEach((u, i) => {
                div.innerHTML += `
                <div class="stat-card" onclick='openPopout(${JSON.stringify(u)})'>
                    <div class="flex items-center gap-3">
                        <span class="rank-num">${i+1}</span>
                        <img src="${u?.av || ''}" class="w-8 h-8 rounded-full">
                        <div>
                            <div class="text-sm font-bold" style="color:${u?.tc || '#fff'}">${u?.dn || 'Bilinmeyen'}</div>
                            <div class="text-[10px] text-[#949ba4] font-medium">@${u?.un || 'kullanici'}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-brand">${u?.[field] || 0}</span>
                        <span class="text-[9px] text-[#949ba4] font-bold uppercase ml-1">${unit}</span>
                    </div>
                </div>`;
            });
        }

        window.openPopout = (u) => {
            if(!u) return;
            document.getElementById('m-dn').innerText = u.dn;
            document.getElementById('m-un').innerText = "@" + u.un;
            document.getElementById('m-av').src = u.av;
            document.getElementById('m-banner').style.background = u.bn ? `url(${u.bn}) center/cover` : (u.ac || '#5865f2');
            document.getElementById('m-status').innerText = u.st || "Oyun oynuyor";
            document.getElementById('m-date').innerText = u.jd || "Bilinmiyor";
            document.getElementById('m-roles').innerHTML = (u.rl || []).map(r => `
                <div class="role-badge">
                    <div class="role-dot" style="background:${r.c}"></div>
                    ${r.n}
                </div>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        load();
    </script>
</body>
</html>
