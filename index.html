<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Palyacolar | Server Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=GG+Sans:wght@400;700&display=swap');
        body { background: #111214; color: #dbdee1; font-family: 'GG Sans', sans-serif; }
        .sidebar { background: #1e1f22; border-right: 1px solid #2b2d31; }
        .nav-btn { color: #949ba4; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #35373c; color: white; }
        .glass-card { background: #2b2d31; border-radius: 8px; transition: transform 0.2s; }
        .glass-card:hover { transform: scale(1.01); background: #313338; }

        .profile-banner { height: 120px; background: #5865f2; border-radius: 8px 8px 0 0; }
        .avatar-border { border: 6px solid #111214; background: #111214; }
        .status-badge { background: #111214; border-radius: 4px; padding: 12px; font-size: 13px; }
        
        .rank-1 { border-left: 4px solid #f1c40f; }
        .rank-2 { border-left: 4px solid #bdc3c7; }
        .rank-3 { border-left: 4px solid #e67e22; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div class="sidebar w-72 flex flex-col p-4">
        <div class="flex items-center gap-3 px-2 mb-8 mt-2">
            <img id="site-logo" src="" class="w-12 h-12 rounded-full shadow-lg bg-indigo-500">
            <h1 class="font-bold text-xl tracking-tight text-white">PALYACOLAR</h1>
        </div>

        <nav class="space-y-1 flex-1">
            <button onclick="changeMode('daily')" id="btn-daily" class="nav-btn active w-full flex items-center gap-3 p-3 rounded-md font-medium text-sm">
                <i class="fa-solid fa-bolt w-5 text-center"></i> GÜNLÜK AKTİFLİK
            </button>
            <button onclick="changeMode('weekly')" id="btn-weekly" class="nav-btn w-full flex items-center gap-3 p-3 rounded-md font-medium text-sm">
                <i class="fa-solid fa-calendar-alt w-5 text-center"></i> HAFTALIK REKABET
            </button>
            <button onclick="changeMode('all_time')" id="btn-all_time" class="nav-btn w-full flex items-center gap-3 p-3 rounded-md font-medium text-sm">
                <i class="fa-solid fa-crown w-5 text-center"></i> EFSANELER (TÜM)
            </button>
        </nav>
    </div>

    <div class="flex-1 overflow-y-auto p-8 bg-[#313338]">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-extrabold text-white uppercase tracking-tight" id="header-title">GÜNLÜK SIRALAMA</h2>
                <div class="bg-[#1e1f22] px-4 py-2 rounded text-xs font-bold text-gray-400">CANLI TAKİP SİSTEMİ</div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <div>
                    <h3 class="flex items-center gap-2 mb-4 font-bold text-gray-400 text-sm uppercase">
                        <i class="fa-solid fa-message text-[#5865f2]"></i> Mesajlaşma Liderleri
                    </h3>
                    <div id="msg-list" class="space-y-2"></div>
                </div>

                <div>
                    <h3 class="flex items-center gap-2 mb-4 font-bold text-gray-400 text-sm uppercase">
                        <i class="fa-solid fa-microphone text-[#23a559]"></i> Ses Aktifliği (Dakika)
                    </h3>
                    <div id="voice-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-[#111214] w-full max-w-[340px] rounded-xl overflow-hidden shadow-2xl transition-all" onclick="event.stopPropagation()">
            <div id="u-banner" class="profile-banner relative"></div>
            <div class="px-4 pb-6">
                <div class="relative inline-block -mt-14 mb-3">
                    <img id="u-avatar" src="" class="w-24 h-24 rounded-full avatar-border">
                </div>
                <h3 id="u-name" class="text-xl font-bold text-white"></h3>
                <p id="u-tag" class="text-gray-400 text-sm mb-4"></p>
                
                <div class="status-badge mb-4 italic text-gray-300" id="u-status"></div>

                <div class="space-y-4">
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Hakkında</p>
                        <p class="text-xs" id="u-joined"></p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Roller</p>
                        <div id="u-roles" class="flex flex-wrap gap-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentMode = 'daily';

        onValue(ref(db, 'palyacolar_stats/settings'), (s) => {
            const data = s.val();
            if(data) document.getElementById('site-logo').src = data.bot_avatar;
        });

        window.changeMode = (m) => {
            currentMode = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+m).classList.add('active');
            document.getElementById('header-title').innerText = m === 'all_time' ? 'EFSANELER TABLOSU' : m.toUpperCase() + ' SIRALAMA';
            loadData();
        };

        function loadData() {
            const dateStr = new Date().toISOString().split('T')[0];
            const key = currentMode === 'all_time' ? 'all_time' : (currentMode === 'daily' ? dateStr : ''); 
            
            onValue(ref(db, `palyacolar_stats/messages/${currentMode}/${key || 'all_time'}`), (snap) => render(snap.val(), 'msg-list', 'count', 'MESAJ'));
            onValue(ref(db, `palyacolar_stats/voice/${currentMode}/${key || 'all_time'}`), (snap) => render(snap.val(), 'voice-list', 'minutes', 'DAKİKA'));
        }

        function render(data, containerId, field, unit) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            if(!data) { container.innerHTML = "<div class='p-4 text-gray-600 text-xs uppercase'>Veri yok...</div>"; return; }

            const sorted = Object.values(data).sort((a,b) => b[field] - a[field]).slice(0, 10);
            sorted.forEach((u, i) => {
                container.innerHTML += `
                    <div class="glass-card flex items-center justify-between p-3 rank-${i+1} cursor-pointer" onclick='openProfile(${JSON.stringify(u)})'>
                        <div class="flex items-center gap-3">
                            <span class="w-4 text-xs font-bold text-gray-500">${i+1}</span>
                            <img src="${u.avatar}" class="w-8 h-8 rounded-full">
                            <span class="text-sm font-bold text-white">${u.display_name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-bold text-[#5865f2]">${u[field]}</span>
                            <span class="text-[9px] font-bold text-gray-500 ml-1">${unit}</span>
                        </div>
                    </div>`;
            });
        }

        window.openProfile = (u) => {
            document.getElementById('u-name').innerText = u.display_name;
            document.getElementById('u-tag').innerText = "@" + u.name;
            document.getElementById('u-avatar').src = u.avatar;
            document.getElementById('u-banner').style.background = u.banner ? `url(${u.banner}) center/cover` : (u.color || '#5865f2');
            document.getElementById('u-status').innerText = u.status || "Durum yok";
            document.getElementById('u-joined').innerText = u.joined_at + " tarihinde katıldı";
            document.getElementById('u-roles').innerHTML = u.roles.map(r => `<span class="bg-[#2b2d31] border border-gray-700 px-2 py-1 rounded text-[10px]">${r}</span>`).join('');
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';
        loadData();
    </script>
</body>
</html>
