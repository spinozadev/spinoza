<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.7, user-scalable=no" />
    <meta property="og:title" content="Spinoza">
    <meta property="og:image" content="spinoza.lol/img/discordpp.png">
    <meta property="og:site_name" content="spinoza.lol">
    <meta property="og:description" content="discord.gg/palyaco yaz gel">
    <title> { spinoza.lol } </title>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #030303;
            --glow: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(from 180deg at 50% 50%, #000000 0deg, #0a0a0a 120deg, #000000 240deg, #050505 360deg);
            animation: rotateBg 20s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 20px;
            animation: scaleUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .brand-logo {
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -4px;
            margin-bottom: 60px;
            text-transform: lowercase;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
            user-select: none;
        }

        .progress-box {
            width: 100%;
            height: 12px; 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            position: relative;
            overflow: visible; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 100px;
            box-shadow: 0 0 40px var(--glow), 0 0 10px #fff;
            transition: width 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            position: relative;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @media (max-width: 768px) {
            .brand-logo { font-size: 3.5rem; letter-spacing: -2px; }
            .container { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-logo">{ spinoza.lol }</div>
        
        <div class="progress-box">
            <div class="progress-fill" id="bar"></div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('bar');
        let width = 0;

        const frame = () => {
            if (width < 30) width += 0.8;
            else if (width < 70) width += 0.4;
            else if (width < 100) width += 0.2;

            bar.style.width = width + "%";

            if (width < 100) {
                requestAnimationFrame(frame);
            } else {
                setTimeout(() => {
                    window.location.href = "https://guns.lol/spinoza";
                }, 500);
            }
        };
        
        setTimeout(() => {
            requestAnimationFrame(frame);
        }, 300);
    </script>
</body>
</html>
