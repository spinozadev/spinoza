<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyacolar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=gg+sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --background-floating: 0 0 0 1px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.1);
            
            --background-primary: #313338;
            --background-secondary: #2b2d31;
            --background-secondary-alt: #202225;
            --background-tertiary: #17181c;
            --background-modifier-hover: rgba(79,84,92,.16);
            --background-modifier-active: rgba(79,84,92,.24);
            --background-modifier-selected: rgba(79,84,92,.32);
            --background-modifier-accent: rgba(88,101,242,.2);
            
            --text-normal: #d9d9d9;
            --text-muted: #8e969c;
            --text-muted-more: #72767d;
            
            --brand-experiment: #5865f2;
            --brand-experiment-2: #5865f2;
            --interactive: #b9bbbe;
            --interactive-hover: #dcddde;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: "gg sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--background-tertiary);
            color: var(--text-normal);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .guilds-container {
            width: 72px;
            background: var(--background-secondary-alt);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 8px;
            flex-shrink: 0;
        }

        .guild-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(47,49,54,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .16s ease-out;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .guild-icon:hover {
            background: var(--brand-experiment);
            border-radius: 16px;
            transform: translateY(-1px) scale(1.025);
            box-shadow: var(--background-floating);
        }

        .guild-icon.active {
            background: var(--brand-experiment);
            border-radius: 16px;
            box-shadow: var(--background-floating);
        }

        .guild-icon.active::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 40px;
            background: #fff;
            border-radius: 0 2px 2px 0;
        }

        .channels-container {
            width: 240px;
            background: var(--background-primary);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset -8px 0 16px rgba(0,0,0,.3);
        }

        .channels-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid rgba(32,34,37,.6);
            color: #fff;
        }

        .channels-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px 16px;
        }

        .channel-category {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-muted-more);
            padding: 8px 12px 4px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .channel {
            padding: 8px 16px;
            margin: 1px 4px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all .16s ease-out;
            color: var(--text-muted);
            font-size: 15px;
        }

        .channel:hover {
            background: var(--background-modifier-hover);
            color: var(--text-normal);
            padding-left: 20px;
        }

        .channel.active {
            background: var(--background-modifier-selected);
            color: var(--text-normal);
        }

        .channel.active::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--brand-experiment);
            border-radius: 0 2px 2px 0;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: linear-gradient(180deg, var(--background-primary) 0%, var(--background-secondary) 100%);
        }

        .header-container {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(32,34,37,.6);
            background: rgba(43,45,49,.8);
            backdrop-filter: blur(20px);
        }

        .channel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 17px;
            color: #fff;
        }

        .messages-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 40px 60px 40px;
        }

        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .hero-section {
            background: rgba(43,45,49,.8);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(32,34,37,.6);
            padding: 48px 40px;
            margin-bottom: 40px;
            text-align: center;
            box-shadow: var(--background-floating);
        }

        .hero-title {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #dcddde 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -.5px;
        }

        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 40px;
        }

        @media (max-width: 1400px) {
            .leaderboard-grid { grid-template-columns: 1fr; }
        }

        .leaderboard-card {
            background: rgba(43,45,49,.8);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(32,34,37,.6);
            overflow: hidden;
            box-shadow: var(--background-floating);
        }

        .leaderboard-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(32,34,37,.6);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 16px;
            color: #fff;
        }

        .leaderboard-scroller {
            max-height: 640px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 20px 32px;
            border-bottom: 1px solid rgba(32,34,37,.3);
            transition: all .16s ease-out;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .leaderboard-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--brand-experiment);
            opacity: 0;
            transform: scaleY(0);
            transition: all .2s ease;
        }

        .leaderboard-item:hover {
            background: var(--background-modifier-hover);
        }

        .leaderboard-item:hover::before {
            opacity: 1;
            transform: scaleY(1);
        }

        .rank-badge {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            margin-right: 20px;
            flex-shrink: 0;
            box-shadow: var(--background-floating);
        }

        .rank-1 { background: linear-gradient(135deg, #f47c21, #e66a0e); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #b8b8b8, #a0a0a0); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b5651d); color: #fff; }
        .rank-default { background: var(--brand-experiment); color: #fff; }

        .user-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 20px;
            flex-shrink: 0;
            border: 3px solid rgba(255,255,255,.1);
            box-shadow: var(--background-floating);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-displayname {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 4px;
            color: #fff;
        }

        .user-stats {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .members-container {
            width: 240px;
            background: var(--background-primary);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset 6px 0 16px rgba(0,0,0,.4);
        }

        .members-header {
            padding: 20px 20px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted-more);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid rgba(32,34,37,.6);
        }

        .members-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .16s ease-out;
            margin-bottom: 4px;
        }

        .member-item:hover {
            background: var(--background-modifier-hover);
            transform: translateX(4px);
        }

        .member-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(47,49,54,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        .member-details {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .member-score {
            font-size: 13px;
            color: var(--text-muted);
        }

        .loading {
            position: fixed;
            inset: 0;
            background: var(--background-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .loading-spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(88,101,242,.2);
            border-top: 4px solid var(--brand-experiment);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .scroller {
            scrollbar-width: thin;
            scrollbar-color: rgba(79,84,92,.4) transparent;
        }

        .scroller::-webkit-scrollbar {
            width: 10px;
        }

        .scroller::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroller::-webkit-scrollbar-thumb {
            background: rgba(79,84,92,.4);
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .scroller::-webkit-scrollbar-thumb:hover {
            background: rgba(79,84,92,.6);
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="app scroller" id="app" style="display: none;">
        <div class="guilds-container">
            <div class="guild-icon active">
                <i class="fas fa-clown" style="font-size: 24px; color: #fff;"></i>
            </div>
        </div>

        <div class="channels-container scroller">
            <div class="channels-header">
                <i class="fas fa-clown" style="margin-right: 12px; color: var(--brand-experiment); font-size: 20px;"></i>
                PALYACOLAR
            </div>
            <div class="channels-scroller">
                <div class="channel-category">🏆 Liderlik</div>
                <div class="channel active" data-tab="daily">
                    <i class="fas fa-fire" style="font-size: 16px; opacity: .7; width: 20px;"></i>
                    <span>günlük</span>
                </div>
                <div class="channel" data-tab="weekly">
                    <i class="fas fa-chart-line" style="font-size: 16px; opacity: .7; width: 20px;"></i>
                    <span>haftalık</span>
                </div>
                <div class="channel" data-tab="monthly">
                    <i class="fas fa-calendar-alt" style="font-size: 16px; opacity: .7; width: 20px;"></i>
                    <span>aylık</span>
                </div>
                <div class="channel" data-tab="all_time">
                    <i class="fas fa-crown" style="font-size: 16px; opacity: .7; width: 20px;"></i>
                    <span>efsaneler</span>
                </div>
            </div>
        </div>

        <div class="main-container">
            <div class="header-container">
                <div class="channel-header">
                    <i class="fas fa-hashtag" style="font-size: 18px; opacity: .7;"></i>
                    <span id="current-channel">günlük</span>
                </div>
            </div>
            <div class="messages-scroller scroller" id="messages">
                <div class="content-container">
                    <div class="hero-section">
                        <div class="hero-title">🏆 LİDERLER ZİRVESİ</div>
                    </div>
                    <div class="leaderboard-grid" id="leaderboards"></div>
                </div>
            </div>
        </div>

        <div class="members-container scroller">
            <div class="members-header">
                ZİRVEDEKİLER <span id="member-count">24</span>
            </div>
            <div class="members-scroller" id="members-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        let currentTab = 'daily';
        let msgData = {}, voiceData = {};

        const formatNumber = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n;

        const renderLeaderboard = (data, type) => {
            if (!data) return '';
            const items = Object.values(data).sort((a,b)=>b.sc-a.sc).slice(0,18);
            return items.map((user,i)=>{
                const rankClass = i<3 ? `rank-${i+1}` : 'rank-default';
                return `
                    <div class="leaderboard-item">
                        <div class="rank-badge ${rankClass}">${i<3?i+1:i+1}</div>
                        <img src="${user.av||'https://via.placeholder.com/56/7289da/ffffff?text=👤'}" class="user-avatar" onerror="this.src='https://via.placeholder.com/56/7289da/ffffff?text=👤'">
                        <div class="user-info">
                            <div class="user-displayname">${user.dn||'Kullanıcı'}</div>
                            <div class="user-stats">${formatNumber(user.sc||0)} ${type}</div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        const renderMembers = () => {
            const top = Object.values(msgData).sort((a,b)=>b.sc-a.sc).slice(0,22);
            document.getElementById('member-count').textContent = top.length;
            document.getElementById('members-list').innerHTML = top.map(u=>`
                <div class="member-item">
                    <div class="member-avatar-small">
                        <img src="${u.av||''}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.innerHTML='👤'">
                    </div>
                    <div class="member-details">
                        <div class="member-name">${u.dn||'Kullanıcı'}</div>
                        <div class="member-score">${formatNumber(u.sc||0)} msg</div>
                    </div>
                </div>
            `).join('');
        };

        const renderContent = () => {
            document.getElementById('leaderboards').innerHTML = `
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <i class="fas fa-message" style="font-size: 20px; color: var(--brand-experiment);"></i>
                        Mesaj Kralları
                    </div>
                    <div class="leaderboard-scroller">${renderLeaderboard(msgData,'msg')}</div>
                </div>
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <i class="fas fa-microphone" style="font-size: 20px; color: #43b581;"></i>
                        Ses Efendileri
                    </div>
                    <div class="leaderboard-scroller">${renderLeaderboard(voiceData,'dk')}</div>
                </div>
            `;
        };

        const switchTab = e => {
            currentTab = e.target.closest('.channel').dataset.tab;
            document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));
            e.target.closest('.channel').classList.add('active');
            document.getElementById('current-channel').textContent = currentTab;
            loadData();
        };

        const loadData = () => {
            onValue(ref(db,`stats_v2/msg/${currentTab}`),s=>{
                msgData = s.val()||{};
                renderContent();
                renderMembers();
            });
            onValue(ref(db,`stats_v2/voice/${currentTab}`),s=>{
                voiceData = s.val()||{};
                renderContent();
            });
        };

        document.addEventListener('DOMContentLoaded',()=>{
            document.querySelectorAll('.channel').forEach(c=>c.addEventListener('click',switchTab));
            setTimeout(()=>{
                document.getElementById('loading').remove();
                document.getElementById('app').style.display = 'flex';
                loadData();
            },800);
        });
    </script>
</body>
</html>
