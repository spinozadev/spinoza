<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Palyacolar | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans');
        :root { --b1: #111214; --b2: #1e1f22; --b3: #2b2d31; --b4: #313338; --brand: #5865f2; }
        body { background: var(--b1); color: #dbdee1; font-family: 'gg sans', sans-serif; margin:0; overflow:hidden; }
        
        .sidebar { width: 240px; background: var(--b3); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        .nav-item { margin: 2px 8px; padding: 8px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #949ba4; font-size: 14px; font-weight: 500; }
        .nav-item:hover { background: #35373c; color: #dbdee1; }
        .nav-item.active { background: #3f4147; color: #fff; }

        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border-radius: 4px; transition: 0.1s; cursor: pointer; }
        .list-item:hover { background: rgba(78, 80, 88, 0.3); }

        /* Discord Profile Card */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
        .popout { width: 340px; background: #111214; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .pop-banner { height: 60px; background: var(--brand); }
        .pop-avatar-wrap { position: relative; height: 40px; padding: 0 16px; }
        .pop-avatar { width: 80px; height: 80px; border-radius: 50%; border: 6px solid #111214; position: absolute; bottom: -10px; background: #111214; }
        .pop-content { padding: 16px; background: #111214; }
        .pop-section { background: #1e1f22; border-radius: 8px; padding: 12px; margin-top: 12px; }
        
        .role-pill { background: #2b2d31; border-radius: 4px; padding: 4px 8px; font-size: 11px; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .role-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body class="flex h-screen">

    <div class="sidebar">
        <div class="h-12 flex items-center px-4 font-bold text-white border-b border-[#1e1f22]">PALYACOLAR</div>
        <div class="flex-1 py-4">
            <div class="px-4 mb-2 text-[11px] font-bold text-gray-500 uppercase tracking-widest">İstatistikler</div>
            <div onclick="setTab('daily')" id="t-daily" class="nav-item active"><i class="fa-solid fa-bolt"></i> günlük-aktiflik</div>
            <div onclick="setTab('total')" id="t-total" class="nav-item"><i class="fa-solid fa-crown"></i> efsaneler-tablosu</div>
        </div>
        <div class="p-3 bg-[#232428] flex items-center gap-3">
            <img id="bot-av" src="" class="w-8 h-8 rounded-full">
            <div class="text-xs font-bold text-white">Palyacolar Bot <br><span class="text-[10px] text-green-500 font-normal">Çevrimiçi</span></div>
        </div>
    </div>

    <div class="flex-1 flex flex-col bg-[#313338]">
        <div class="h-12 flex items-center px-4 gap-3 border-b border-[#2b2d31] shadow-sm">
            <i class="fa-solid fa-hashtag text-gray-500"></i>
            <span class="font-bold text-white text-sm uppercase tracking-wide" id="p-title">günlük-aktiflik</span>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex justify-center">
            <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-4 px-2 border-b border-[#3f4147] pb-2">Mesaj Gönderimi</h3>
                    <div id="msg-list" class="space-y-0.5"></div>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-4 px-2 border-b border-[#3f4147] pb-2">Ses Aktifliği (DK)</h3>
                    <div id="voice-list" class="space-y-0.5"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="popout animate-in fade-in duration-200" onclick="event.stopPropagation()">
            <div id="m-bn" class="pop-banner"></div>
            <div class="pop-avatar-wrap">
                <img id="m-av" src="" class="pop-avatar">
            </div>
            <div class="pop-content">
                <div class="bg-[#1e1f22] p-4 rounded-lg">
                    <h2 id="m-dn" class="text-xl font-bold text-white leading-none mb-1"></h2>
                    <p id="m-un" class="text-gray-400 text-sm font-medium"></p>
                    <div class="h-[1px] bg-[#2b2d31] my-3"></div>
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-1">Hakkında / Durum</p>
                    <p id="m-st" class="text-sm text-gray-200 italic"></p>
                </div>
                
                <div class="pop-section">
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-2">Roller</p>
                    <div id="m-rl" class="flex flex-wrap gap-1.5"></div>
                    <div class="h-[1px] bg-[#2b2d31] my-3"></div>
                    <p class="text-[10px] font-bold text-gray-300 uppercase mb-1">Sunucuya Katılım</p>
                    <p id="m-jd" class="text-xs text-gray-400"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(config);
        const db = getDatabase(app);
        let currentTab = 'daily';

        onValue(ref(db, 'palyacolar_stats/settings'), s => {
            if(s.exists()) document.getElementById('bot-av').src = s.val().bot_avatar;
        });

        window.setTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('t-'+t).classList.add('active');
            document.getElementById('p-title').innerText = t === 'daily' ? 'günlük-aktiflik' : 'efsaneler-tablosu';
            load();
        };

        function load() {
            const date = new Date().toISOString().split('T')[0];
            const key = currentTab === 'daily' ? date : 'all';
            onValue(ref(db, `palyacolar_stats/msg/${currentTab}/${key}`), s => render(s.val(), 'msg-list', 'sc', 'mesaj'));
            onValue(ref(db, `palyacolar_stats/voice/${currentTab}/${key}`), s => render(s.val(), 'voice-list', 'sc', 'dakika'));
        }

        function render(data, container, field, unit) {
            const div = document.getElementById(container);
            div.innerHTML = "";
            if(!data) { div.innerHTML = "<div class='p-4 text-xs text-gray-600'>VERİ YOK...</div>"; return; }

            Object.values(data).sort((a,b) => b[field] - a[field]).slice(0, 15).forEach((u, i) => {
                const avatar = u?.av || 'https://cdn.discordapp.com/embed/avatars/0.png';
                const dName = u?.dn || 'Bilinmeyen Kullanıcı';
                const uName = u?.un || 'kullanici';
                const score = u?.[field] || 0;
                const color = u?.tc || '#b5bac1';

                div.innerHTML += `
                <div class="list-item" onclick='showPopout(${JSON.stringify(u)})'>
                    <div class="flex items-center gap-3">
                        <span class="w-4 text-center font-bold text-gray-600 text-[10px]">${i+1}</span>
                        <img src="${avatar}" class="w-8 h-8 rounded-full">
                        <div>
                            <div class="text-sm font-bold" style="color:${color}">${dName}</div>
                            <div class="text-[10px] text-gray-500 font-medium">@${uName}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-brand">${score}</span>
                        <span class="text-[9px] text-gray-600 font-bold uppercase ml-0.5">${unit}</span>
                    </div>
                </div>`;
            });
        }

        window.showPopout = (u) => {
            if(!u) return;
            document.getElementById('m-dn').innerText = u.dn || 'İsimsiz';
            document.getElementById('m-un').innerText = "@" + (u.un || 'kullanici');
            document.getElementById('m-av').src = u.av || '';
            document.getElementById('m-bn').style.background = u.bn ? `url(${u.bn}) center/cover` : (u.ac || '#5865f2');
            document.getElementById('m-st').innerText = u.st || "Durum yok";
            document.getElementById('m-jd').innerText = u.jd || "Bilinmiyor";
            document.getElementById('m-rl').innerHTML = (u.rl || []).map(r => `
                <div class="role-pill">
                    <div class="role-dot" style="background:${r.c}"></div>
                    ${r.n}
                </div>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        load();
    </script>
</body>
</html>
