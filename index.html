<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyacolar | Discord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --bg-tertiary: #202225;
            --bg-quaternary: #292b2f;
            --bg-modifier-hover: rgba(79, 84, 92, 0.16);
            --bg-modifier-active: rgba(79, 84, 92, 0.24);
            --bg-modifier-selected: rgba(79, 84, 92, 0.32);
            
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --text-link: #00aff4;
            
            --brand-experiment: #5865f2;
            --danger: #ed4245;
            --success: #57f287;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Whitney', sans-serif;
            background: var(--bg-tertiary);
            color: var(--text-normal);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .app {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Sunucu Listesi */
        .servers {
            width: 70px;
            background: var(--bg-quaternary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
        }

        .server-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .server-icon:hover {
            background: var(--brand-experiment);
            transform: scale(1.05);
        }

        .server-icon.active {
            background: var(--brand-experiment);
        }

        .server-icon.active::before {
            content: '';
            position: absolute;
            left: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 32px;
            background: white;
            border-radius: 0 2px 2px 0;
        }

        /* Kanallar */
        .channels {
            width: 240px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.2);
        }

        .channel-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .channel-category {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 8px 8px 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .channel-item {
            padding: 6px 12px;
            margin: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s ease;
            color: var(--text-muted);
        }

        .channel-item:hover {
            background: var(--bg-modifier-hover);
            color: var(--text-normal);
        }

        .channel-item.active {
            background: var(--bg-modifier-selected);
            color: var(--text-normal);
        }

        /* Ana Alan */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
            background: var(--bg-secondary);
        }

        .chat-title {
            font-weight: 600;
            font-size: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .stats-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .stats-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .leaderboard-item:hover {
            background: var(--bg-modifier-hover);
        }

        .rank-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .rank-1 { background: #f47c21; }
        .rank-2 { background: #9c9c9c; }
        .rank-3 { background: #cd7f32; }
        .rank-normal { background: var(--brand-experiment); }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-stats {
            color: var(--text-muted);
            font-size: 14px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--brand-experiment);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* Üyeler */
        .members-panel {
            width: 240px;
            background: var(--bg-primary);
            border-left: 1px solid rgba(0,0,0,0.2);
        }

        .members-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .member-item:hover {
            background: var(--bg-modifier-hover);
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .member-name {
            font-weight: 500;
            flex: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(79, 84, 92, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(79, 84, 92, 0.5);
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-secondary);
            border-top: 3px solid var(--brand-experiment);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div style="margin-top: 16px; font-size: 14px; color: var(--text-muted);">Yükleniyor...</div>
    </div>

    <div class="app" id="app" style="display: none;">
        <!-- Sunucu Listesi -->
        <div class="servers">
            <div class="server-icon active">
                <i class="fab fa-discord" style="font-size: 24px; color: white;"></i>
            </div>
        </div>

        <!-- Kanallar -->
        <div class="channels">
            <div class="channel-header">
                <i class="fas fa-clown" style="margin-right: 8px; color: var(--brand-experiment);"></i>
                Palyacolar
            </div>
            <div class="channels-list">
                <div class="channel-category">İstatistikler</div>
                <div class="channel-item active" onclick="switchTab('daily')">
                    <i class="fas fa-fire" style="width: 18px;"></i>
                    # günlük-liderlik
                </div>
                <div class="channel-item" onclick="switchTab('weekly')">
                    <i class="fas fa-chart-line"></i>
                    # haftalık-rekabet
                </div>
                <div class="channel-item" onclick="switchTab('monthly')">
                    <i class="fas fa-calendar-alt"></i>
                    # aylık-zirve
                </div>
                <div class="channel-item" onclick="switchTab('alltime')">
                    <i class="fas fa-crown"></i>
                    # tüm-zamanların-en-iyileri
                </div>
            </div>
        </div>

        <!-- Ana İçerik -->
        <div class="main-content">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-hashtag" style="color: var(--text-muted);"></i>
                    <span class="chat-title" id="current-tab">günlük-liderlik</span>
                </div>
            </div>

            <div class="chat-messages" id="content">
                <!-- İçerik buraya yüklenecek -->
            </div>
        </div>

        <!-- Üyeler -->
        <div class="members-panel">
            <div class="members-header">
                Çevrimiçi <span id="online-count">24</span>
            </div>
            <div class="members-list" id="members-list">
                <!-- Üye listesi buraya yüklenecek -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let currentTab = 'daily';
        let messageData = {};
        let voiceData = {};

        // Tab değiştirme
        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('current-tab').textContent = tab === 'alltime' ? 'tüm-zamanların-en-iyileri' : `${tab}-liderlik`;
            renderContent();
        };

        // Sayı formatlama
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Liderlik tablosu oluştur
        function createLeaderboard(data, type) {
            if (!data) return '<div style="padding: 40px; text-align: center; color: var(--text-muted);">Veri yükleniyor...</div>';
            
            const items = Object.values(data)
                .sort((a, b) => b.sc - a.sc)
                .slice(0, 20);

            let html = '';
            items.forEach((user, index) => {
                const rankClass = index < 3 ? `rank-${index + 1}` : 'rank-normal';
                const rankText = index < 3 ? ['1', '2', '3'][index] : `${index + 1}`;
                
                html += `
                    <div class="leaderboard-item">
                        <div class="rank-badge ${rankClass}">${rankText}</div>
                        <div class="member-avatar">
                            <img src="${user.av || 'https://via.placeholder.com/32/7289da/ffffff?text=👤'}" 
                                 style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" 
                                 onerror="this.parentNode.innerHTML='<i style=\'color: var(--text-muted); font-size: 12px;\'>👤</i>'">
                        </div>
                        <div class="user-info">
                            <div class="user-name">${user.dn || 'Bilinmeyen Kullanıcı'}</div>
                            <div class="user-stats">${formatNumber(user.sc || 0)} ${type === 'voice' ? 'dk' : 'msg'}</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min((user.sc / (items[0]?.sc || 1)) * 100, 100)}%"></div>
                        </div>
                    </div>
                `;
            });

            return html;
        }

        // İçerik render et
        function renderContent() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="stats-card">
                    <div class="stats-header">
                        <i class="fas fa-trophy" style="color: var(--brand-experiment); font-size: 24px;"></i>
                        <span>${currentTab === 'daily' ? 'Günlük' : currentTab === 'weekly' ? 'Haftalık' : currentTab === 'monthly' ? 'Aylık' : 'Tüm Zamanların'} Liderlik Tablosu</span>
                    </div>
                    <div class="stats-grid">
                        <div>
                            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-normal);">💬 Mesaj Kralları</h3>
                            <div class="leaderboard" id="msg-leaderboard">${createLeaderboard(messageData, 'message')}</div>
                        </div>
                        <div>
                            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-normal);">🎤 Ses Efendileri</h3>
                            <div class="leaderboard" id="voice-leaderboard">${createLeaderboard(voiceData, 'voice')}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Üye listesi render et
        function renderMembers() {
            const membersList = document.getElementById('members-list');
            const topUsers = Object.values(messageData)
                .sort((a, b) => b.sc - a.sc)
                .slice(0, 15);

            let html = '';
            topUsers.forEach(user => {
                html += `
                    <div class="member-item">
                        <div class="member-avatar">
                            <img src="${user.av || 'https://via.placeholder.com/32/7289da/ffffff?text=👤'}" 
                                 style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;"
                                 onerror="this.parentNode.innerHTML='<i style=\'color: var(--text-muted); font-size: 12px;\'>👤</i>'">
                        </div>
                        <div class="member-name">${user.dn || 'Bilinmeyen'}</div>
                        <div style="color: var(--text-muted); font-size: 12px;">${formatNumber(user.sc || 0)} msg</div>
                    </div>
                `;
            });

            membersList.innerHTML = html;
            document.getElementById('online-count').textContent = topUsers.length;
        }

        // Firebase dinleyicileri
        function startListeners() {
            // Mesaj verileri
            const msgRef = ref(database, `stats_v2/msg/${currentTab}`);
            onValue(msgRef, (snapshot) => {
                messageData = snapshot.val() || {};
                renderContent();
                renderMembers();
            });

            // Ses verileri
            const voiceRef = ref(database, `stats_v2/voice/${currentTab}`);
            onValue(voiceRef, (snapshot) => {
                voiceData = snapshot.val() || {};
                renderContent();
            });
        }

        // Başlatma
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                startListeners();
                renderContent();
            }, 1500);
        });
    </script>
</body>
</html>
