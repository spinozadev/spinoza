<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyacolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=gg+sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --background-primary: #36393f;
            --background-secondary: #2f3136;
            --background-secondary-alt: #292b2f;
            --background-tertiary: #202225;
            --background-modifier-hover: rgba(79,84,92,.16);
            --background-modifier-active: rgba(79,84,92,.24);
            --background-modifier-selected: rgba(79,84,92,.32);
            
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --text-link: #00aff4;
            
            --brand-experiment-500: #5865f2;
            --brand-experiment-600: #4752c4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'gg sans', sans-serif;
            background: var(--background-tertiary);
            color: var(--text-normal);
            height: 100vh;
            overflow: hidden;
        }

        .app { display: flex; height: 100vh; }

        .guilds {
            width: 70px;
            background: var(--background-secondary-alt);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 12px;
        }

        .guild-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(47,49,54,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-radius .2s,transform .2s;
            position: relative;
        }

        .guild-icon:hover {
            background: var(--brand-experiment-500);
            border-radius: 16px;
            transform: scale(1.05);
        }

        .guild-icon.active {
            background: var(--brand-experiment-500);
            border-radius: 16px;
        }

        .guild-icon.active::before {
            content: '';
            position: absolute;
            left: -4px;
            top: 12px;
            width: 3px;
            height: 36px;
            background: #fff;
            border-radius: 0 2px 2px 0;
        }

        .channels {
            width: 240px;
            background: var(--background-primary);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .channels-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 1px solid rgba(32,34,37,.6);
        }

        .channels-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px 0;
        }

        .channel-category {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0 0 8px 16px;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 4px;
        }

        .channel {
            padding: 6px 16px;
            margin: 1px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all .15s ease;
            color: var(--text-muted);
            font-size: 15px;
        }

        .channel:hover {
            background: var(--background-modifier-hover);
            color: var(--text-normal);
        }

        .channel.active {
            background: var(--background-modifier-selected);
            color: var(--text-normal);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid rgba(32,34,37,.6);
            background: var(--background-secondary);
            font-weight: 600;
            font-size: 16px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px 24px;
        }

        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-card {
            background: var(--background-secondary);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(32,34,37,.6);
            text-align: center;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #dcddde 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .leaderboards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        @media (max-width: 1200px) {
            .leaderboards { grid-template-columns: 1fr; }
        }

        .leaderboard-card {
            background: var(--background-secondary);
            border-radius: 8px;
            border: 1px solid rgba(32,34,37,.6);
            overflow: hidden;
        }

        .leaderboard-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(32,34,37,.6);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .leaderboard-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(32,34,37,.3);
            transition: background .15s ease;
            cursor: pointer;
        }

        .leaderboard-item:hover {
            background: var(--background-modifier-hover);
        }

        .rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .rank-1 { background: #f47c21; color: #fff; }
        .rank-2 { background: #9c9c9c; color: #fff; }
        .rank-3 { background: #cd7f32; color: #fff; }
        .rank-default { background: var(--brand-experiment-500); color: #fff; }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .user-score {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }

        .members {
            width: 240px;
            background: var(--background-primary);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-left: 1px solid rgba(32,34,37,.6);
        }

        .members-header {
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid rgba(32,34,37,.6);
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .member {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: background .15s ease;
            font-size: 15px;
        }

        .member:hover {
            background: var(--background-modifier-hover);
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--background-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .members-panel::-webkit-scrollbar,
        .channels-scroller::-webkit-scrollbar,
        .messages::-webkit-scrollbar,
        .leaderboard-list::-webkit-scrollbar {
            width: 8px;
        }

        .members-panel::-webkit-scrollbar-track,
        .channels-scroller::-webkit-scrollbar-track,
        .messages::-webkit-scrollbar-track,
        .leaderboard-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .members-panel::-webkit-scrollbar-thumb,
        .channels-scroller::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb,
        .leaderboard-list::-webkit-scrollbar-thumb {
            background: rgba(79,84,92,.3);
            border-radius: 4px;
        }

        .members-panel::-webkit-scrollbar-thumb:hover,
        .channels-scroller::-webkit-scrollbar-thumb:hover,
        .messages::-webkit-scrollbar-thumb:hover,
        .leaderboard-list::-webkit-scrollbar-thumb:hover {
            background: rgba(79,84,92,.5);
        }

        .loading {
            position: fixed;
            inset: 0;
            background: var(--background-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(88,101,242,.3);
            border-top: 3px solid var(--brand-experiment-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="app" id="app" style="display: none;">
        <div class="guilds">
            <div class="guild-icon active">
                <i class="fas fa-clown" style="font-size: 24px; color: #fff;"></i>
            </div>
        </div>

        <div class="channels">
            <div class="channels-header">
                <i class="fas fa-clown" style="margin-right: 12px; color: var(--brand-experiment-500); font-size: 18px;"></i>
                Palyacolar
            </div>
            <div class="channels-scroller">
                <div class="channel-category">🏆 Sıralamalar</div>
                <div class="channel active" data-tab="daily">
                    <i class="fas fa-fire" style="width: 20px; opacity: .6;"></i>
                    <span>günlük</span>
                </div>
                <div class="channel" data-tab="weekly">
                    <i class="fas fa-chart-line" style="width: 20px; opacity: .6;"></i>
                    <span>haftalık</span>
                </div>
                <div class="channel" data-tab="monthly">
                    <i class="fas fa-calendar-alt" style="width: 20px; opacity: .6;"></i>
                    <span>aylık</span>
                </div>
                <div class="channel" data-tab="all_time">
                    <i class="fas fa-crown" style="width: 20px; opacity: .6;"></i>
                    <span>efsaneler</span>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <i class="fas fa-hashtag" style="margin-right: 12px; color: var(--text-muted); opacity: .6;"></i>
                <span id="current-channel">günlük</span>
            </div>
            <div class="messages" id="messages">
                <div class="stats-container">
                    <div class="hero-card">
                        <div class="hero-title">LİDERLER</div>
                    </div>
                    <div class="leaderboards" id="leaderboards"></div>
                </div>
            </div>
        </div>

        <div class="members" id="members-panel">
            <div class="members-header">
                ZİRVE <span id="member-count">24</span>
            </div>
            <div class="members-list" id="members-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        let currentTab = 'daily';
        let msgData = {};
        let voiceData = {};

        function formatNumber(n) {
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n;
        }

        function renderLeaderboard(data, type) {
            if (!data) return '';
            const items = Object.values(data).sort((a,b) => b.sc - a.sc).slice(0,15);
            let html = '';
            items.forEach((user,i) => {
                const rankClass = i<3 ? `rank-${i+1}` : 'rank-default';
                const rankNum = i<3 ? i+1 : i+1;
                html += `
                    <div class="leaderboard-item">
                        <div class="rank ${rankClass}">${rankNum}</div>
                        <img src="${user.av || ''}" class="user-avatar" onerror="this.src='https://via.placeholder.com/48/7289da/ffffff?text=👤'">
                        <div class="user-details">
                            <div class="user-name">${user.dn || 'Kullanıcı'}</div>
                            <div class="user-score">${formatNumber(user.sc || 0)} ${type}</div>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function renderMembers() {
            const top = Object.values(msgData).sort((a,b) => b.sc - a.sc).slice(0,20);
            document.getElementById('member-count').textContent = top.length;
            document.getElementById('members-list').innerHTML = top.map(u => `
                <div class="member">
                    <div class="member-avatar">
                        <img src="${u.av || ''}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.innerHTML='👤'">
                    </div>
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${u.dn || 'Kullanıcı'}</div>
                        <div style="font-size:13px;color:var(--text-muted);">${formatNumber(u.sc || 0)} msg</div>
                    </div>
                </div>
            `).join('');
        }

        function renderContent() {
            document.getElementById('leaderboards').innerHTML = `
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <i class="fas fa-message" style="color: var(--brand-experiment-500);"></i>
                        Mesaj Liderleri
                    </div>
                    <div class="leaderboard-list">${renderLeaderboard(msgData, 'msg')}</div>
                </div>
                <div class="leaderboard-card">
                    <div class="leaderboard-header">
                        <i class="fas fa-microphone" style="color: #43b581;"></i>
                        Ses Liderleri
                    </div>
                    <div class="leaderboard-list">${renderLeaderboard(voiceData, 'dk')}</div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
            event.target.closest('.channel').classList.add('active');
            document.getElementById('current-channel').textContent = tab;
            loadData();
        }

        function loadData() {
            onValue(ref(db, `stats_v2/msg/${currentTab}`), s => {
                msgData = s.val() || {};
                renderContent();
                renderMembers();
            });
            onValue(ref(db, `stats_v2/voice/${currentTab}`), s => {
                voiceData = s.val() || {};
                renderContent();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.channel').forEach(c => {
                c.addEventListener('click', () => switchTab(c.dataset.tab));
            });
            
            setTimeout(() => {
                document.getElementById('loading').remove();
                document.getElementById('app').style.display = 'flex';
                loadData();
            }, 1200);
        });
    </script>
</body>
</html>
