<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyacolar Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'whitney': ['"gg sans"', 'Whitney', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        'discord-bg': '#313338',
                        'discord-sidebar': '#2B2D31',
                        'discord-guilds': '#1E1F22',
                        'discord-blurple': '#5865F2',
                        'discord-blurple-dark': '#4752C4',
                        'discord-text': '#DCDDDE',
                        'discord-muted': '#72767D',
                        'discord-hover': 'rgba(79,84,92,0.16)',
                        'discord-active': 'rgba(79,84,92,0.32)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=gg+sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --background-floating: 0 0 0 1px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'gg sans', 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #1E1F22;
            color: #DCDDDE;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .guilds {
            width: 72px;
            background: #1E1F22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: inset -8px 0 20px rgba(0,0,0,.5);
        }

        .guild-btn {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(47,49,54,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s cubic-bezier(.175,.885,.32,1.275);
            position: relative;
            backdrop-filter: blur(20px);
        }

        .guild-btn:hover {
            background: #5865F2;
            transform: translateY(-2px) scale(1.05);
            box-shadow: var(--background-floating);
        }

        .guild-btn.active {
            background: #5865F2;
            box-shadow: var(--background-floating);
        }

        .guild-btn.active::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 44px;
            background: #fff;
            border-radius: 0 3px 3px 0;
        }

        .channels {
            width: 240px;
            background: #2B2D31;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset -6px 0 16px rgba(0,0,0,.4);
        }

        .channel-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid rgba(32,34,37,.8);
            color: #fff;
            background: rgba(43,45,49,.6);
            backdrop-filter: blur(20px);
        }

        .channels-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .channel-category {
            font-size: 12px;
            font-weight: 700;
            color: #72767D;
            padding: 8px 8px 4px 20px;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 8px;
        }

        .channel-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 2px 4px;
            border-radius: 6px;
            cursor: pointer;
            color: #72767D;
            font-weight: 500;
            font-size: 15px;
            transition: all .16s ease-out;
            position: relative;
            overflow: hidden;
        }

        .channel-link:hover {
            background: rgba(79,84,92,.16);
            color: #DCDDDE;
            padding-left: 24px;
        }

        .channel-link.active {
            background: rgba(79,84,92,.32);
            color: #DCDDDE;
        }

        .channel-link.active::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: #5865F2;
            border-radius: 0 2px 2px 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: linear-gradient(180deg, #313338 0%, #2B2D31 100%);
        }

        .top-bar {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid rgba(32,34,37,.8);
            background: rgba(43,45,49,.8);
            backdrop-filter: blur(20px);
        }

        .page-title {
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 48px 64px 48px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .stats-card {
            background: rgba(43,45,49,.8);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(32,34,37,.6);
            padding: 32px;
            box-shadow: var(--background-floating);
            transition: all .2s ease-out;
        }

        .stats-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
        }

        .leaderboard {
            max-height: 400px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(32,34,37,.3);
            transition: all .16s ease-out;
            cursor: pointer;
        }

        .leaderboard-item:hover {
            background: rgba(79,84,92,.16);
            padding-left: 8px;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
        }

        .rank-gold { background: linear-gradient(135deg, #F47C21, #E66A0E); color: #fff; }
        .rank-silver { background: linear-gradient(135deg, #B8B8B8, #A0A0A0); color: #fff; }
        .rank-bronze { background: linear-gradient(135deg, #CD7F32, #B5651D); color: #fff; }
        .rank-normal { background: #5865F2; color: #fff; }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,.1);
        }

        .user-info h4 {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #fff;
        }

        .user-score {
            font-size: 15px;
            color: #72767D;
            font-weight: 500;
        }

        .members-panel {
            width: 240px;
            background: #2B2D31;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: inset 6px 0 20px rgba(0,0,0,.5);
        }

        .members-header {
            padding: 24px 20px 16px;
            font-size: 12px;
            font-weight: 700;
            color: #72767D;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(32,34,37,.8);
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: all .16s ease-out;
        }

        .member-row:hover {
            background: rgba(79,84,92,.16);
            padding-left: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 3px solid #2B2D31;
            flex-shrink: 0;
        }

        .status-online { background: #43B581; }
        .status-idle { background: #FAA61A; }

        .scroller::-webkit-scrollbar {
            width: 8px;
        }

        .scroller::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroller::-webkit-scrollbar-thumb {
            background: rgba(79,84,92,.5);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .scroller::-webkit-scrollbar-thumb:hover {
            background: rgba(79,84,92,.7);
        }

        @media (max-width: 1600px) {
            .content-area { padding: 32px 40px; }
        }

        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .members-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Guilds Sidebar -->
        <div class="guilds">
            <div class="guild-btn active">
                <i class="fas fa-clown" style="font-size: 24px; color: #fff;"></i>
            </div>
        </div>

        <!-- Channels Sidebar -->
        <div class="channels">
            <div class="channel-header">
                <i class="fas fa-clown" style="margin-right: 12px; color: #5865F2; font-size: 20px;"></i>
                PALYACOLAR DASHBOARD
            </div>
            <div class="channels-scroller scroller">
                <div class="channel-category">📊 İstatistikler</div>
                <div class="channel-link active" data-period="daily">
                    <i class="fas fa-fire" style="font-size: 16px; opacity: .8;"></i>
                    <span>Günlük</span>
                </div>
                <div class="channel-link" data-period="weekly">
                    <i class="fas fa-chart-line" style="font-size: 16px; opacity: .8;"></i>
                    <span>Haftalık</span>
                </div>
                <div class="channel-link" data-period="monthly">
                    <i class="fas fa-calendar-alt" style="font-size: 16px; opacity: .8;"></i>
                    <span>Aylık</span>
                </div>
                <div class="channel-category mt-4">👑 Efsaneler</div>
                <div class="channel-link" data-period="alltime">
                    <i class="fas fa-crown" style="font-size: 16px; opacity: .8;"></i>
                    <span>Tüm Zamanlar</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <i class="fas fa-hashtag" style="opacity: .8;"></i>
                    <span id="current-period">Günlük</span>
                </div>
            </div>
            <div class="content-area scroller" id="content-area">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>

        <!-- Members Panel -->
        <div class="members-panel scroller">
            <div class="members-header">
                AKTİF PALYACOLAR <span id="online-count">24</span>
            </div>
            <div class="members-list scroller" id="members-list">
                <!-- Members will be injected here -->
            </div>
        </div>
    </div>

    <script>
        class PalyacolarDashboard {
            constructor() {
                this.currentPeriod = 'daily';
                this.data = {
                    daily: { messages: {}, voice: {} },
                    weekly: { messages: {}, voice: {} },
                    monthly: { messages: {}, voice: {} },
                    alltime: { messages: {}, voice: {} }
                };
                this.resetTimes = {
                    daily: this.getNextDailyReset(),
                    weekly: this.getNextWeeklyReset(),
                    monthly: this.getNextMonthlyReset()
                };
                this.init();
            }

            init() {
                this.loadData();
                this.bindEvents();
                this.render();
                this.startUpdateLoop();
            }

            bindEvents() {
                document.querySelectorAll('.channel-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        const period = e.currentTarget.dataset.period;
                        this.switchPeriod(period);
                    });
                });
            }

            switchPeriod(period) {
                this.currentPeriod = period;
                document.querySelectorAll('.channel-link').forEach(l => l.classList.remove('active'));
                document.querySelector(`[data-period="${period}"]`).classList.add('active');
                document.getElementById('current-period').textContent = 
                    period === 'daily' ? 'Günlük' :
                    period === 'weekly' ? 'Haftalık' :
                    period === 'monthly' ? 'Aylık' : 'Efsaneler';
                this.render();
            }

            generateMockUser() {
                const names = ['ClownKing', 'JokerPro', 'PalyaçoX', 'LaughterBot', 'SmileMaster', 'GiggleLord', 'FunFactory', 'LaughRiot', 'JokeMaster', 'HahaHero'];
                return {
                    id: Math.random().toString(36).substr(2, 9),
                    dn: names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 9999),
                    av: `https://i.pravatar.cc/64?u=${Math.random()}`,
                    sc: Math.floor(Math.random() * 5000) + 100,
                    st: ['Online', 'Boşta', 'Ofline'][Math.floor(Math.random() * 3)]
                };
            }

            updateData() {
                // Simulate real-time data updates
                ['daily', 'weekly', 'monthly'].forEach(period => {
                    if (!this.data[period].messages[this.currentPeriod]) {
                        this.data[period].messages = {};
                    }
                    const newUser = this.generateMockUser();
                    this.data[period].messages[newUser.id] = newUser;
                    
                    // Update scores randomly
                    Object.values(this.data[period].messages).forEach(user => {
                        user.sc += Math.floor(Math.random() * 10) + 1;
                    });
                });
                
                this.saveData();
                this.render();
            }

            checkResets() {
                const now = Date.now();
                
                if (now >= this.resetTimes.daily) {
                    this.data.daily = { messages: {}, voice: {} };
                    this.resetTimes.daily = this.getNextDailyReset();
                }
                
                if (now >= this.resetTimes.weekly) {
                    this.data.weekly = { messages: {}, voice: {} };
                    this.resetTimes.weekly = this.getNextWeeklyReset();
                }
                
                if (now >= this.resetTimes.monthly) {
                    this.data.monthly = { messages: {}, voice: {} };
                    this.resetTimes.monthly = this.getNextMonthlyReset();
                }
            }

            getNextDailyReset() {
                const now = new Date();
                now.setHours(24, 0, 0, 0);
                return now.getTime();
            }

            getNextWeeklyReset() {
                const now = new Date();
                now.setDate(now.getDate() + (7 - now.getDay()));
                now.setHours(0, 0, 0, 0);
                return now.getTime();
            }

            getNextMonthlyReset() {
                const now = new Date();
                now.setMonth(now.getMonth() + 1);
                now.setDate(1);
                now.setHours(0, 0, 0, 0);
                return now.getTime();
            }

            saveData() {
                localStorage.setItem('palyacolar_data', JSON.stringify(this.data));
                localStorage.setItem('palyacolar_reset_times', JSON.stringify(this.resetTimes));
            }

            loadData() {
                const savedData = localStorage.getItem('palyacolar_data');
                const savedResets = localStorage.getItem('palyacolar_reset_times');
                
                if (savedData) {
                    this.data = JSON.parse(savedData);
                }
                if (savedResets) {
                    this.resetTimes = JSON.parse(savedResets);
                }
            }

            renderLeaderboard(data, type) {
                if (!data || Object.keys(data).length === 0) {
                    return '<div class="text-center py-12 text-[#72767D]"><i class="fas fa-ghost text-4xl mb-4 opacity-50"></i><p>Henüz veri yok</p></div>';
                }

                const sorted = Object.values(data)
                    .sort((a, b) => b.sc - a.sc)
                    .slice(0, 12);

                return sorted.map((user, index) => {
                    const rankClass = index === 0 ? 'rank-gold' : 
                                    index === 1 ? 'rank-silver' : 
                                    index === 2 ? 'rank-bronze' : 'rank-normal';
                    
                    return `
                        <div class="leaderboard-item">
                            <div class="rank-badge ${rankClass}">${index + 1}</div>
                            <img src="${user.av}" class="user-avatar" onerror="this.src='https://via.placeholder.com/48/7289da/ffffff?text=👤'">
                            <div class="user-info">
                                <h4>${user.dn}</h4>
                                <div class="user-score">${this.formatNumber(user.sc)} ${type === 'voice' ? 'dk' : 'msg'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderMembers() {
                const data = this.data[this.currentPeriod];
                if (!data.messages || Object.keys(data.messages).length === 0) return;

                const topUsers = Object.values(data.messages)
                    .sort((a, b) => b.sc - a.sc)
                    .slice(0, 15);

                document.getElementById('online-count').textContent = topUsers.length;
                
                document.getElementById('members-list').innerHTML = topUsers.map(user => `
                    <div class="member-row">
                        <div class="flex items-center gap-3">
                            <div class="member-avatar">
                                <img src="${user.av}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentNode.innerHTML='👤'">
                            </div>
                            <div class="status-dot ${user.st === 'Online' ? 'status-online' : 'status-idle'}"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-sm truncate">${user.dn}</div>
                            <div class="text-xs text-[#72767D]">${this.formatNumber(user.sc)} msg</div>
                        </div>
                    </div>
                `).join('');
            }

            render() {
                const data = this.data[this.currentPeriod];
                
                document.getElementById('content-area').innerHTML = `
                    <div class="dashboard-grid">
                        <div class="stats-card">
                            <div class="card-header">
                                <div class="card-icon bg-gradient-to-br from-[#5865F2] to-[#4752C4]">
                                    <i class="fas fa-message"></i>
                                </div>
                                <span>Mesaj Liderleri</span>
                            </div>
                            <div class="leaderboard scroller">${this.renderLeaderboard(data.messages, 'message')}</div>
                        </div>
                        <div class="stats-card">
                            <div class="card-header">
                                <div class="card-icon bg-gradient-to-br from-[#43B581] to-[#3BA55C]">
                                    <i class="fas fa-microphone"></i>
                                </div>
                                <span>Ses Liderleri</span>
                            </div>
                            <div class="leaderboard scroller">${this.renderLeaderboard(data.voice, 'voice')}</div>
                        </div>
                    </div>
                `;

                this.renderMembers();
            }

            formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toLocaleString();
            }

            startUpdateLoop() {
                setInterval(() => {
                    this.checkResets();
                    this.updateData();
                }, 5000);
            }
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            new PalyacolarDashboard();
        });
    </script>
</body>
</html>
