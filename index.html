<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Palyacolar | Infinite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans');

        :root {
            --d-base: #020202; /* Ultra Dark */
            --d-sidebar: #111214;
            --d-channels: #1e1f22;
            --d-main: #2b2d31;
            --d-card: rgba(43, 45, 49, 0.6);
            --brand: #5865f2;
            --brand-glow: rgba(88, 101, 242, 0.4);
            --gold: #f0b232;
            --silver: #949ba4;
            --bronze: #a652bb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--d-base); 
            color: #dbdee1; 
            font-family: 'gg sans', sans-serif; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
        }

        /* --- SÜPER YÜKLENME EKRANI --- */
        #ultra-loader {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shimmer-logo {
            width: 120px; filter: drop-shadow(0 0 15px var(--brand));
            animation: infinite-glow 2s infinite alternate;
        }
        @keyframes infinite-glow {
            from { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 10px var(--brand)); }
            to { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 30px var(--brand)); }
        }

        /* --- ANA YAPI --- */
        .guilds-panel { width: 72px; background: var(--d-base); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        .channels-panel { width: 240px; background: var(--d-sidebar); display: flex; flex-direction: column; flex-shrink: 0; border-radius: 12px 12px 0 0; margin-top: 4px; }
        .main-stage { flex: 1; background: var(--d-main); display: flex; flex-direction: column; margin-top: 4px; border-radius: 12px 0 0 0; position: relative; overflow: hidden; }

        /* Cam Efekti Arkaplan (Hareketli Nebula) */
        .nebula-bg {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle at center, #1e1f22 0%, #020202 100%);
            z-index: 0; opacity: 0.5; pointer-events: none;
        }

        /* --- GUILD ICONS --- */
        .g-icon {
            width: 48px; height: 48px; border-radius: 24px; background: var(--d-channels);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.215, 0.61, 0.355, 1); cursor: pointer;
            position: relative; color: #fff; font-size: 20px;
        }
        .g-icon:hover, .g-icon.active { border-radius: 14px; background: var(--brand); box-shadow: 0 0 20px var(--brand-glow); }
        .g-icon.active::after { content: ""; position: absolute; left: -14px; width: 4px; height: 32px; background: #fff; border-radius: 0 4px 4px 0; }

        /* --- RANK CARDS (BUG FIXED) --- */
        .card-container {
            display: flex; align-items: center; padding: 12px 16px;
            background: var(--d-card); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.03); border-radius: 12px;
            margin-bottom: 8px; transition: 0.2s; cursor: pointer; position: relative;
        }
        .card-container:hover { 
            transform: translateX(4px); background: rgba(78, 80, 88, 0.4);
            border-color: var(--brand); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .avatar-box {
            position: relative; width: 44px; height: 44px; flex-shrink: 0; /* Kaymayı önleyen kritik kilit */
            margin-right: 12px; display: flex; align-items: center; justify-content: center;
        }
        .avatar-img { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid transparent; transition: 0.2s;
        }
        .card-container:hover .avatar-img { border-color: var(--brand); }

        .rank-glow {
            position: absolute; inset: -2px; border-radius: 50%;
            z-index: -1; opacity: 0; transition: 0.3s;
        }
        .top-1 .rank-glow { opacity: 1; box-shadow: 0 0 15px var(--gold); background: var(--gold); }

        /* --- DISCORD MODERN MODAL --- */
        .infinite-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 100000;
            backdrop-filter: blur(8px);
        }
        .popout-v3 {
            width: 380px; background: #111214; border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .banner-v3 { height: 120px; background: var(--brand); position: relative; }
        .av-v3 {
            width: 100px; height: 100px; border-radius: 50%; border: 8px solid #111214;
            position: absolute; top: 65px; left: 16px; background: #111214;
        }

        /* --- SCROLLBAR --- */
        .scroller-v3::-webkit-scrollbar { width: 6px; }
        .scroller-v3::-webkit-scrollbar-thumb { background: #111214; border-radius: 10px; }
        .scroller-v3::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>

    <div id="ultra-loader">
        <img src="https://cdn.prod.website-files.com/6257adef93867e3d0394e296/636e0a6a49f9a757c1aa1750_633d53690623a6064d6023d5_discord-icon.svg" class="shimmer-logo">
        <div class="mt-10 flex flex-col items-center">
            <div class="w-48 h-1 bg-zinc-800 rounded-full overflow-hidden">
                <div id="bar" class="w-0 h-full bg-indigo-500 transition-all duration-700"></div>
            </div>
            <p class="text-[10px] text-zinc-500 mt-4 font-black tracking-[4px] uppercase">Palyacolar Infinite OS</p>
        </div>
    </div>

    <div class="guilds-panel">
        <div class="g-icon active"><i class="fa-solid fa-clown"></i></div>
        <div class="w-8 h-[2px] bg-zinc-800"></div>
        <div class="g-icon text-green-500"><i class="fa-solid fa-plus"></i></div>
        <div class="g-icon text-green-500"><i class="fa-solid fa-compass"></i></div>
    </div>

    <div class="channels-panel">
        <div class="h-12 flex items-center px-4 font-black text-white text-sm tracking-tight shadow-md">
            PALYACOLAR <i class="fa-solid fa-circle-check ml-2 text-indigo-400 text-[10px]"></i>
            <i class="fa-solid fa-chevron-down ml-auto text-xs opacity-50"></i>
        </div>
        <div class="flex-1 overflow-y-auto scroller-v3 py-4 px-2">
            <p class="text-[10px] font-bold text-zinc-500 uppercase px-3 mb-2 tracking-widest">Global Stats</p>
            <div onclick="changeTab('daily')" id="btn-daily" class="flex items-center gap-2 px-3 py-2 rounded-md bg-zinc-700/50 text-white cursor-pointer mb-1">
                <i class="fa-solid fa-hashtag text-zinc-500"></i> günlük-aktiflik
            </div>
            <div onclick="changeTab('weekly')" id="btn-weekly" class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-400 hover:bg-zinc-800 cursor-pointer mb-1">
                <i class="fa-solid fa-hashtag text-zinc-500"></i> haftalık-rekabet
            </div>
            <div onclick="changeTab('monthly')" id="btn-monthly" class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-400 hover:bg-zinc-800 cursor-pointer mb-1">
                <i class="fa-solid fa-hashtag text-zinc-500"></i> aylık-zirve
            </div>
            <div onclick="changeTab('all_time')" id="btn-all_time" class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-400 hover:bg-zinc-800 cursor-pointer mb-1">
                <i class="fa-solid fa-hashtag text-zinc-500"></i> efsaneler-tablosu
            </div>
        </div>
        <div class="bg-[#232428] p-2 flex items-center gap-3">
            <div class="relative w-8 h-8 flex-shrink-0">
                <img id="bot-avatar" src="" class="w-full h-full rounded-full">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#232428] rounded-full"></div>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-white truncate">Palyacolar Bot</p>
                <p class="text-[10px] text-zinc-500">online</p>
            </div>
            <i class="fa-solid fa-gear text-zinc-400 hover:text-white cursor-pointer"></i>
        </div>
    </div>

    <div class="main-stage">
        <div class="nebula-bg"></div>
        <div class="h-12 flex items-center px-4 gap-3 border-b border-white/5 relative z-10">
            <i class="fa-solid fa-hashtag text-zinc-500 text-xl"></i>
            <span id="tab-name" class="font-bold text-white text-sm uppercase">günlük-aktiflik</span>
            <div class="ml-auto flex items-center gap-5 text-zinc-400">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-thumbtack"></i>
                <i class="fa-solid fa-users"></i>
                <div class="bg-black/20 px-2 py-1 rounded text-xs border border-white/5">Ara... <i class="fa-solid fa-magnifying-glass ml-2 opacity-50"></i></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto scroller-v3 p-6 relative z-10">
            <div class="max-w-7xl mx-auto grid grid-cols-1 xl:grid-cols-2 gap-10">
                
                <div class="animate-fade-in">
                    <div class="flex items-center justify-between mb-6 px-2">
                        <h3 class="font-black text-white text-lg tracking-tighter uppercase italic">Mesaj İmparatorları</h3>
                        <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-full font-bold">LIVE UPDATE</span>
                    </div>
                    <div id="msg-list" class="space-y-2"></div>
                </div>

                <div class="animate-fade-in">
                    <div class="flex items-center justify-between mb-6 px-2">
                        <h3 class="font-black text-white text-lg tracking-tighter uppercase italic">Ses Efendileri</h3>
                        <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-full font-bold">STABLE</span>
                    </div>
                    <div id="voice-list" class="space-y-2"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="m-modal" class="infinite-modal" onclick="this.style.display='none'">
        <div class="popout-v3" onclick="event.stopPropagation()">
            <div id="m-bn" class="banner-v3"></div>
            <div class="relative h-12">
                <img id="m-av" src="" class="av-v3">
            </div>
            <div class="p-6 pt-10">
                <div class="bg-black/20 p-4 rounded-xl border border-white/5">
                    <h2 id="m-dn" class="text-2xl font-black text-white mb-1"></h2>
                    <p id="m-un" class="text-zinc-500 text-sm mb-4"></p>
                    <div class="flex gap-2 mb-4" id="m-badges">
                        <i class="fa-solid fa-shield-halved text-indigo-400"></i>
                        <i class="fa-solid fa-gem text-pink-400"></i>
                        <i class="fa-solid fa-bolt text-yellow-400"></i>
                    </div>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase mb-2">Hakkımda</p>
                    <p id="m-st" class="text-sm text-zinc-300 leading-relaxed"></p>
                </div>
                
                <div class="mt-4 bg-black/20 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-bold text-zinc-500 uppercase mb-3">Roller</p>
                    <div id="m-rl" class="flex flex-wrap gap-1.5"></div>
                    <div class="h-[1px] bg-white/5 my-4"></div>
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-zinc-500 uppercase">Katılım Tarihi</p>
                            <p id="m-jd" class="text-xs text-zinc-400"></p>
                        </div>
                        <button class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-md font-bold transition">Mesaj At</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        let tab = 'daily';
        let loadCheck = { m: false, v: false };

        onValue(ref(db, 'stats_v2/meta'), s => {
            if(s.exists()) document.getElementById('bot-avatar').src = s.val().bot_av;
        });

        window.changeTab = (t) => {
            tab = t;
            document.querySelectorAll('[id^="btn-"]').forEach(el => el.className = "flex items-center gap-2 px-3 py-2 rounded-md text-zinc-400 hover:bg-zinc-800 cursor-pointer mb-1");
            document.getElementById('btn-'+t).className = "flex items-center gap-2 px-3 py-2 rounded-md bg-zinc-700/50 text-white cursor-pointer mb-1";
            document.getElementById('tab-name').innerText = t.replace('_','-');
            load();
        }

        function load() {
            document.getElementById('bar').style.width = "40%";
            onValue(ref(db, `stats_v2/msg/${tab}`), s => {
                render(s.val(), 'msg-list', 'sc', 'MSJS');
                loadCheck.m = true; checkDone();
            });
            onValue(ref(db, `stats_v2/voice/${tab}`), s => {
                render(s.val(), 'voice-list', 'sc', 'DK');
                loadCheck.v = true; checkDone();
            });
        }

        function checkDone() {
            if(loadCheck.m && loadCheck.v) {
                document.getElementById('bar').style.width = "100%";
                setTimeout(() => document.getElementById('ultra-loader').style.opacity = '0', 600);
                setTimeout(() => document.getElementById('ultra-loader').style.display = 'none', 1000);
            }
        }

        function render(data, cid, field, unit) {
            const div = document.getElementById(cid);
            div.innerHTML = "";
            if(!data) { div.innerHTML = "<div class='text-zinc-600 text-xs italic p-10 text-center border border-white/5 rounded-xl'>Henüz kimse zirveye oynamamış...</div>"; return; }

            Object.values(data).sort((a,b) => b[field] - a[field]).slice(0, 30).forEach((u, i) => {
                const isTop = i === 0 ? 'top-1' : '';
                const rankColor = i === 0 ? 'var(--gold)' : (i === 1 ? '#cbd5e1' : (i === 2 ? '#fb923c' : '#52525b'));

                div.innerHTML += `
                    <div class="card-container ${isTop}" onclick='openModal(${JSON.stringify(u)})'>
                        <div class="rank-glow"></div>
                        <div class="avatar-box">
                            <img src="${u.av}" class="avatar-img shadow-2xl">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-black truncate" style="color:${u.tc}">${u.dn}</span>
                                ${i < 3 ? `<i class="fa-solid fa-medal" style="color:${rankColor}"></i>` : ''}
                            </div>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">@${u.un}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-black text-white italic tracking-tighter">${u[field]}</span>
                            <span class="text-[9px] block font-bold text-zinc-500 leading-none">${unit}</span>
                        </div>
                    </div>
                `;
            });
        }

        window.openModal = (u) => {
            document.getElementById('m-dn').innerText = u.dn;
            document.getElementById('m-un').innerText = "@" + u.un;
            document.getElementById('m-av').src = u.av;
            document.getElementById('m-bn').style.background = u.bn ? `url(${u.bn}) center/cover` : (u.ac || '#5865f2');
            document.getElementById('m-st').innerText = u.st || "Palyacoların derinliklerinden gelen bir ses...";
            document.getElementById('m-jd').innerText = u.jd;
            document.getElementById('m-rl').innerHTML = (u.rl || []).map(r => `
                <div class="px-2 py-1 bg-white/5 border border-white/5 rounded flex items-center gap-1.5 text-[10px] text-zinc-300">
                    <div class="w-2 h-2 rounded-full" style="background:${r.c}"></div>${r.n}
                </div>
            `).join('');
            document.getElementById('m-modal').style.display = 'flex';
        }

        load();
    </script>
</body>
</html>
