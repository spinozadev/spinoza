<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="https://spinoza.lol/img/palyaco.ico" type="image/x-icon">
    <meta property="og:title" content="Spinoza">
    <meta property="og:image" content="spinoza.lol/img/discordpp.png">
    <meta property="og:site_name" content="spinoza.lol">
    <meta property="og:description" content="discord.gg/palyaco yaz gel">
    <title> { spinoza.lol } </title>
    <style>
        :root { --bg: #030303; --glow: rgba(255, 255, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; cursor: default; }
        body { 
            background-color: var(--bg); 
            background: radial-gradient(circle at center, #111 0%, #030303 100%); 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
            touch-action: none; 
        }
        body::before { 
            content: ""; 
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background: conic-gradient(from 180deg at 50% 50%, #000 0deg, #0a0a0a 120deg, #000 240deg, #050505 360deg); 
            animation: rotateBg 15s linear infinite; 
            z-index: -1; 
            opacity: 0.6; 
        }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: scaleUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        .brand-logo { 
            font-size: clamp(2.5rem, 15vw, 5.5rem); 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: -4px; 
            margin-bottom: 25px; 
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); 
            text-align: center;
            width: 100%;
        }
        .progress-box { 
            width: 100%; 
            height: 10px; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 100px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 2px; 
            visibility: hidden; 
            overflow: hidden;
        }
        .progress-fill { 
            height: 100%; 
            width: 0%; 
            background: #fff; 
            border-radius: 100px; 
            box-shadow: 0 0 30px var(--glow), 0 0 10px #fff; 
            transition: width 40ms linear; 
        }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 480px) { 
            .container { max-width: 85%; }
            .brand-logo { letter-spacing: -2px; margin-bottom: 20px; } 
            .progress-box { height: 8px; } 
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;" onmousedown="return false;">
    <div class="container">
        <div class="brand-logo">{ spinoza.lol }</div>
        <div class="progress-box" id="pbox"><div class="progress-fill" id="bar"></div></div>
    </div>
    <script>
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); window.location.href = 'https://spinoza.lol/bluescreen'; }
            if (e.key === 'F12') { e.preventDefault(); window.location.href = 'https://spinoza.lol/redscreen'; }
            if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) { e.preventDefault(); window.location.href = 'https://spinoza.lol/redscreen'; }
        });
        setInterval(() => { if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) window.location.href = 'https://spinoza.lol/redscreen'; }, 500);
        
        const bar = document.getElementById('bar');
        const pbox = document.getElementById('pbox');
        let width = 0;

        const animateBar = () => {
            if (width < 100) {
                width += 3;
                if (width >= 100) {
                    width = 100;
                    bar.style.width = "100%";
                    setTimeout(() => { window.location.href = "https://guns.lol/spinoza"; }, 50);
                } else {
                    bar.style.width = width + "%";
                    setTimeout(animateBar, 40);
                }
            }
        };

        window.onload = () => {
            setTimeout(() => {
                pbox.style.visibility = "visible";
                animateBar();
            }, 500);
        };
    </script>
</body>
</html>
