<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Discord | Palyacolar Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans');
        :root { --bg-primary: #313338; --bg-secondary: #2b2d31; --bg-tertiary: #1e1f22; --bg-quaternary: #111214; --text-normal: #dbdee1; --brand: #5865f2; }
        body { background: var(--bg-tertiary); color: var(--text-normal); font-family: 'gg sans', sans-serif; margin: 0; overflow: hidden; }

        .server-sidebar { width: 72px; background: var(--bg-quaternary); flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 12px; }
        .channel-sidebar { width: 240px; background: var(--bg-secondary); flex-shrink: 0; display: flex; flex-direction: column; }
        .main-view { flex-grow: 1; background: var(--bg-primary); display: flex; flex-direction: column; }
        
        .channel-link { margin: 2px 8px; padding: 6px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #949ba4; }
        .channel-link:hover { background: #35373c; color: #dbdee1; }
        .channel-link.active { background: #3f4147; color: #fff; }
        
        .stat-card { background: var(--bg-secondary); border-radius: 8px; border: 1px solid transparent; transition: 0.1s; cursor: pointer; }
        .stat-card:hover { border-color: var(--brand); background: #383a40; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
        .profile-container { width: 340px; background: var(--bg-quaternary); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .profile-banner { height: 100px; background: var(--brand); position: relative; }
        .profile-avatar { width: 94px; height: 94px; border-radius: 50%; border: 6px solid var(--bg-quaternary); position: absolute; top: 50px; left: 16px; background: var(--bg-quaternary); }
        .role-tag { background: #2b2d31; font-size: 11px; padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex h-screen">

    <div class="server-sidebar">
        <div class="w-12 h-12 bg-brand rounded-[16px] flex items-center justify-center text-white text-xl mb-2 cursor-pointer transition-all hover:rounded-[12px]">
            <i class="fa-solid fa-clown"></i>
        </div>
        <div class="w-8 h-[2px] bg-[#35373c] mb-2"></div>
    </div>

    <div class="channel-sidebar">
        <div class="h-12 border-b border-[#232428] flex items-center px-4 font-bold text-white shadow-sm"> PALYACOLAR </div>
        <div class="flex-1 py-4">
            <div class="px-4 mb-2 text-[11px] font-bold text-[#949ba4] uppercase tracking-wider">İstatistik Paneli</div>
            <div onclick="setView('daily')" id="nav-daily" class="channel-link active"><i class="fa-solid fa-hashtag"></i> günlük-aktiflik</div>
            <div onclick="setView('all_time')" id="nav-all_time" class="channel-link"><i class="fa-solid fa-hashtag"></i> efsaneler-tablosu</div>
        </div>
        <div class="bg-[#232428] p-2 flex items-center gap-2">
            <img id="bot-status-avatar" src="" class="w-8 h-8 rounded-full bg-gray-700">
            <div class="flex-1 overflow-hidden">
                <div class="text-xs font-bold text-white leading-none">Palyacolar Bot</div>
                <div class="text-[10px] text-green-500">Çevrimiçi</div>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div class="h-12 border-b border-[#232428] flex items-center px-4 gap-4 shadow-sm">
            <i class="fa-solid fa-hashtag text-[#80848e] text-xl"></i>
            <span class="font-bold text-white" id="current-title">günlük-aktiflik</span>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
            <div class="w-full max-w-5xl grid grid-cols-1 xl:grid-cols-2 gap-8">
                
                <div>
                    <h3 class="text-xs font-bold text-[#949ba4] uppercase tracking-widest mb-4 px-2">Mesaj Gönderimi</h3>
                    <div id="msg-box" class="space-y-1"></div>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-[#949ba4] uppercase tracking-widest mb-4 px-2">Ses Süresi</h3>
                    <div id="voice-box" class="space-y-1"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="p-modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="profile-container" onclick="event.stopPropagation()">
            <div id="m-banner" class="profile-banner"></div>
            <div class="relative h-14">
                <img id="m-avatar" src="" class="profile-avatar">
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <div id="m-display" class="text-xl font-bold text-white leading-tight"></div>
                    <div id="m-name" class="text-[#b5bac1] text-sm"></div>
                </div>
                <div class="bg-[#2b2d31] p-3 rounded-lg mb-4">
                    <p class="text-[10px] font-bold text-[#b5bac1] uppercase mb-2">Üyelik Tarihi</p>
                    <p id="m-joined" class="text-xs text-white"></p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-[#b5bac1] uppercase mb-2 px-1">Roller</p>
                    <div id="m-roles" class="flex flex-wrap gap-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://palyacolar-d9f70-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let view = 'daily';

        onValue(ref(db, 'palyacolar_stats/settings'), (s) => {
            const d = s.val(); if(d) document.getElementById('bot-status-avatar').src = d.bot_avatar;
        });

        window.setView = (v) => {
            view = v;
            document.querySelectorAll('.channel-link').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-'+v).classList.add('active');
            document.getElementById('current-title').innerText = v === 'daily' ? 'günlük-aktiflik' : 'efsaneler-tablosu';
            load();
        };

        function load() {
            const key = view === 'daily' ? new Date().toISOString().split('T')[0] : 'all_time';
            onValue(ref(db, `palyacolar_stats/messages/${view}/${key}`), (s) => render(s.val(), 'msg-box', 'count', 'MESAJ'));
            onValue(ref(db, `palyacolar_stats/voice/${view}/${key}`), (s) => render(s.val(), 'voice-box', 'minutes', 'DAKİKA'));
        }

        function render(data, containerId, field, unit) {
            const div = document.getElementById(containerId);
            div.innerHTML = "";
            if(!data) { div.innerHTML = "<div class='text-[#949ba4] text-xs p-4'>Burada henüz kimse yok...</div>"; return; }

            Object.values(data).sort((a,b) => b[field] - a[field]).slice(0, 20).forEach((u, i) => {
                div.innerHTML += `
                <div class="stat-card flex items-center justify-between p-3 mb-1" onclick='openUser(${JSON.stringify(u)})'>
                    <div class="flex items-center gap-3">
                        <span class="w-5 text-xs font-bold text-[#80848e]">${i+1}</span>
                        <img src="${u.avatar}" class="w-8 h-8 rounded-full bg-quaternary">
                        <div class="leading-tight">
                            <div class="text-sm font-bold text-white">${u.display_name}</div>
                            <div class="text-[10px] text-[#b5bac1]">@${u.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold text-brand">${u[field]}</span>
                        <span class="text-[9px] text-[#80848e] font-bold uppercase ml-1">${unit}</span>
                    </div>
                </div>`;
            });
        }

        window.openUser = (u) => {
            document.getElementById('m-display').innerText = u.display_name;
            document.getElementById('m-name').innerText = "@" + u.name;
            document.getElementById('m-avatar').src = u.avatar;
            document.getElementById('m-banner').style.background = u.banner ? `url(${u.banner}) center/cover` : (u.color || '#5865f2');
            document.getElementById('m-joined').innerText = u.joined_at;
            document.getElementById('m-roles').innerHTML = u.roles.map(r => `<span class="role-tag">${r}</span>`).join('');
            document.getElementById('p-modal').style.display = 'flex';
        }

        load();
    </script>
</body>
</html>
